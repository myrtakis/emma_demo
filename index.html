<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>Horizon | Material Selector</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- ===== WELCOME SCREEN ===== -->
  <div id="welcome-screen">
    <div class="welcome-content">
    <div class="image-wrapper">
      <img src="assets/loading_img.jpg" alt="Loading preview" id="loadingImg">
      <button id="startBtn">Build your own panel</button>
    </div>
    </div>
  </div>

  <!-- ===== MAIN APP SCREEN ===== -->
  <div id="app-screen" style="display: none;">
    <div class="app-container">

      <!-- Header: Tune the performance -->
      <div class="section-header">Tune the thermal performance</div>

      <!-- Slider Panel -->
      <div class="selectors-panel">
        <div class="slider-bar">
          <span class="slider-label-left">thermally weak</span>
          <div class="slider-track-group">
            <input type="range" min="1" max="3" step="1" value="1" class="slider black-slider" id="slider1">
          </div>
          <span class="slider-label-right">thermally efficient</span>
        </div>
        <div class="slider-bar">
          <span class="slider-label-left">opaque</span>
          <div class="slider-track-group">
            <input type="range" min="1" max="3" step="1" value="3" class="slider black-slider" id="slider2" disabled>
          </div>
          <span class="slider-label-right">translucent</span>
        </div>
      </div>

      <!-- Header: Define its character -->
      <div class="section-header">Define its character</div>

      <!-- Dropdown Panel -->
      <div class="dropdowns-container">
        <div class="dropdown-group">
          <label for="marbleSelect" class="dropdown-label">marble-like pattern</label>
          <select id="marbleSelect" class="dropdown">
            <option value="">Select</option>
            <option value="1">1- white</option>
            <option value="2">2- white/ black dots</option>
            <option value="3">3- pale pink</option>
            <option value="4">4- pale green</option>
            <option value="5">5- green</option>
            <option value="6">6- light blue</option>
            <option value="7">7- yellow-brown</option>
          </select>
        </div>
        <div class="dropdown-group">
          <label for="terrazzoSelect" class="dropdown-label">terrazzo-like pattern</label>
          <select id="terrazzoSelect" class="dropdown">
            <option value="">Select</option>
            <option value="1">1- white/ blue</option>
            <option value="2">2- light grey</option>
            <option value="3">3- pale pink/ white</option>
            <option value="4">4- pale green</option>
            <option value="5">5- green</option>
            <option value="6">6- light blue</option>
            <option value="7">7- white/ brown</option>
          </select>
        </div>
      </div>

      <!-- Image Stage -->
      <div class="image-stage">
        <div class="dynamic-image-container">
          <div class="spinner" id="spinner"></div>
          <img id="dynamicImage" alt="Material visualisation" src="assets/1.jpg" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22200%22 viewBox=%220 0 400 200%22%3E%3Crect width=%22400%22 height=%22200%22 fill=%22%23f0f0f0%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 font-family=%22monospace%22 fill=%22%23999%22 font-size=%2214%22%3ENot found%3C/text%3E%3C/svg%3E'">
        </div>
      </div>

    </div>
  </div>

<script src="script.js"></script>
</body>
</html>
